<div class="flex flex-col h-full w-full">
  <!-- Logo / Title Area -->
  <div class="h-16 flex items-center px-6 border-b border-[#312e81] shrink-0">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded bg-teal-500 flex items-center justify-center text-white font-bold shadow-sm">
        <fa-icon [icon]="faUser" class="text-sm"></fa-icon>
      </div>
      <div class="flex flex-col">
        <span class="text-white text-base font-semibold tracking-wide">{{ username || 'Client' }}</span>
      </div>
    </div>
  </div>

  <!-- Navigation Links Container -->
  <div class="flex-1 overflow-y-auto py-6 px-3 space-y-1 custom-scrollbar">
    
    <div class="px-3 mb-2 text-xs font-semibold text-indigo-300/60 uppercase tracking-wider">Menu</div>
    
    @for (link of links; track link.path) {
      <a
        [routerLink]="link.path"
        routerLinkActive="bg-[#312e81] text-white"
        [routerLinkActiveOptions]="{ exact: true }"
        class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-indigo-200 hover:bg-[#2c286e] hover:text-white transition-all duration-200 group"
      >
        <span class="w-5 text-center text-indigo-400 group-hover:text-indigo-200 transition-colors text-sm">
          <fa-icon [icon]="link.icon"></fa-icon>
        </span>
        <span class="text-sm font-medium">{{ link.label }}</span>
      </a>
    }
  </div>

  <!-- Logout Area -->
  <div class="p-4 border-t border-[#312e81] shrink-0">
    <button (click)="logout()" class="flex items-center gap-3 w-full px-4 py-2.5 rounded-lg text-indigo-400 hover:bg-[#2c286e] hover:text-rose-400 transition-colors group">
      <svg class="w-5 h-5 text-indigo-400 group-hover:text-rose-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
      <span class="text-sm font-medium">Log out</span>
    </button>
  </div>
</div>
