<div class="h-full flex flex-col p-6 overflow-y-auto">
  <div class="flex items-center gap-4 mb-10 group cursor-default">
    <div class="w-12 h-12 rounded-2xl bg-gradient-to-tr from-emerald-600 to-teal-400 flex items-center justify-center text-white shadow-xl shadow-emerald-500/20 group-hover:scale-110 transition-transform duration-300">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
    </div>
    <div class="flex flex-col">
      <span class="text-white font-black text-lg tracking-tight uppercase leading-none">Station Hub</span>
      <span class="text-slate-500 text-[10px] font-bold tracking-[0.2em] uppercase mt-1">Client Portal</span>
    </div>
  </div>

  <nav class="flex-1 space-y-2">
    <a routerLink="/client/dashboard" routerLinkActive="bg-emerald-600/10 text-emerald-400 border-emerald-500/50" [routerLinkActiveOptions]="{exact: true}"
       class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:text-emerald-50 hover:bg-slate-800/50 border border-transparent transition-all duration-200 group">
      <svg class="w-5 h-5 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
      <span class="font-medium text-sm">Dashboard</span>
    </a>

    <a routerLink="/client/historique" routerLinkActive="bg-emerald-600/10 text-emerald-400 border-emerald-500/50"
       class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:text-emerald-50 hover:bg-slate-800/50 border border-transparent transition-all duration-200 group">
      <svg class="w-5 h-5 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
      <span class="font-medium text-sm">History</span>
    </a>

    <a routerLink="/client/profil" routerLinkActive="bg-emerald-600/10 text-emerald-400 border-emerald-500/50"
       class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:text-emerald-50 hover:bg-slate-800/50 border border-transparent transition-all duration-200 group">
      <svg class="w-5 h-5 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
      <span class="font-medium text-sm">Profile</span>
    </a>
  </nav>

  <div class="mt-auto pt-6 border-t border-slate-800">
    <button (click)="logout()"
            class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-rose-400 hover:text-rose-50 hover:bg-rose-500/10 border border-transparent transition-all duration-200 group">
      <svg class="w-5 h-5 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
      <span class="font-medium text-sm">Logout</span>
    </button>
  </div>
</div>
