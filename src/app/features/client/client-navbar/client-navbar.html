<nav class="bg-gray-950 text-white px-6 py-3 flex items-center justify-between shadow-lg border-b border-gray-800 relative">
  <div class="flex items-center gap-3">
    <span class="inline-flex items-center justify-center w-9 h-9 rounded-full bg-gray-800 text-sm">
      <fa-icon [icon]="faUser" class="text-gray-300 text-lg"></fa-icon>
    </span>
    
    <div class="flex flex-col">
      <span class="text-lg font-semibold tracking-tight">{{ username }}</span>
      <span class="text-xs text-gray-400">Tableau de bord</span>
    </div>
  </div>

  <div class="flex items-center gap-4">
    <!-- Desktop links -->
    <div class="hidden md:flex items-center gap-4 text-sm">
      @for (link of links; track link.path) {
        <a
          [routerLink]="link.path"
          routerLinkActive="border-b-2 border-green-400 text-white"
          [routerLinkActiveOptions]="{ exact: true }"
          class="pb-1 px-1 text-gray-300 hover:text-white hover:border-b-2 hover:border-gray-500 transition inline-flex items-center gap-1.5"
        >
          <fa-icon [icon]="link.icon" class="text-xs"></fa-icon>
          <span>{{ link.label }}</span>
        </a>
      }
    </div>

    <!-- Mobile toggle -->
    <button
      type="button"
      class="md:hidden inline-flex items-center justify-center w-9 h-9 rounded-md border border-gray-700 bg-gray-900 hover:bg-gray-800 transition"
      (click)="toggleMenu()"
      aria-label="Toggle navigation"
    >
      <i class="fa-solid fa-bars text-gray-200 text-lg"></i>
    </button>

    <!-- Desktop logout -->
    <button
      type="button"
      (click)="logout()"
      class="hidden md:inline-flex px-4 py-2 rounded-md bg-gray-900 border border-gray-700 text-sm hover:bg-gray-800 transition"
    >
      Logout
    </button>
  </div>
</nav>

<!-- Mobile Menu -->
@if (isMenuOpen) {
<div
  class="absolute top-16 left-0 w-full md:hidden bg-gray-950 border-b border-gray-800 px-6 pb-3 space-y-2 z-50
         animate-slide-down"
>
    <nav class="flex flex-col gap-2 text-sm">
      @for (link of links; track link.path) {
        <a
          [routerLink]="link.path"
          routerLinkActive="text-white"
          [routerLinkActiveOptions]="{ exact: true }"
          class="text-gray-300 hover:text-white inline-flex items-center gap-2"
          (click)="isMenuOpen = false"
        >
          <fa-icon [icon]="link.icon" class="text-xs"></fa-icon>
          <span>{{ link.label }}</span>
        </a>
      }
    </nav>

    <button
      type="button"
      (click)="logout()"
      class="mt-3 w-full px-4 py-2 rounded-md bg-gray-900 border border-gray-700 text-sm hover:bg-gray-800 transition"
    >
      Logout
    </button>
</div>
}
@endif
