<div class="flex h-screen bg-slate-50 text-slate-900 font-sans selection:bg-emerald-100 selection:text-emerald-700">
  <div *ngIf="isSidebarOpen" (click)="closeSidebar()" class="fixed inset-0 bg-slate-900/50 z-30 transition-opacity xl:hidden"></div>
  <aside [ngClass]="{'translate-x-0': isSidebarOpen, '-translate-x-full': !isSidebarOpen}"
         class="fixed inset-y-0 left-0 z-40 w-80 h-full bg-slate-900 border-r border-slate-800 flex flex-col shadow-2xl transition-transform duration-300 xl:static xl:translate-x-0">
    <app-client-navbar class="flex-1"></app-client-navbar>
  </aside>
  <div class="flex-1 flex flex-col relative h-full overflow-hidden bg-slate-50 w-full">
    <header class="xl:hidden h-20 bg-slate-900 border-b border-slate-800 flex items-center justify-between px-6 shrink-0 z-20">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-2xl bg-emerald-600 flex items-center justify-center text-emerald-50 shadow-lg shadow-emerald-900/20">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
        </div>
        <span class="text-emerald-50 font-black tracking-tight uppercase text-sm">Station Hub</span>
      </div>
      <button (click)="toggleSidebar()" class="w-12 h-12 rounded-2xl bg-slate-800 text-slate-300 flex items-center justify-center active:scale-90 transition-transform focus:outline-none">
        <svg *ngIf="!isSidebarOpen" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
        <svg *ngIf="isSidebarOpen" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
      </button>
    </header>
    <main class="flex-1 overflow-y-auto p-4 md:p-8 xl:p-12 custom-scrollbar scroll-smooth">
      <div class="max-w-7xl mx-auto">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>
</div>
