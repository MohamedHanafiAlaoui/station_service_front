<div class="p-8 bg-indigo-50/20 min-h-screen animate-fade-in">
  <div class="mb-8 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
    <div>
      <h1 class="text-2xl font-semibold text-indigo-950">Clients Management</h1>
      <p class="text-sm text-indigo-500 mt-1">Manage station clients and their balances.</p>
    </div>
    <button routerLink="/employe/clients/create"
      class="px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm font-bold shadow-sm hover:bg-indigo-700 transition-colors flex items-center self-start sm:self-auto">
      <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
      </svg>
      Register New Client
    </button>
  </div>
  <div class="mb-6">
    <div class="relative max-w-md">
      <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
        <svg class="w-4 h-4 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0"/>
        </svg>
      </div>
      <input
        type="text"
        [(ngModel)]="searchKeyword"
        (ngModelChange)="onSearchInput($event)"
        placeholder="Search by name or RFID..."
        class="w-full bg-white border border-indigo-100 rounded-xl pl-11 pr-10 py-2.5 text-sm text-indigo-950 placeholder-indigo-300 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent shadow-sm transition-all">
      <button
        *ngIf="searchKeyword"
        (click)="clearSearch()"
        class="absolute inset-y-0 right-0 pr-3 flex items-center text-indigo-400 hover:text-indigo-600 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <p *ngIf="searchKeyword && searchKeyword.length < 2" class="text-xs text-indigo-400 mt-1 ml-1">
      Type at least 2 characters to search...
    </p>
  </div>
  <ng-container *ngIf="loading$ | async">
    <app-loading-spinner></app-loading-spinner>
  </ng-container>
  <ng-container *ngIf="error$ | async as error">
    <div class="bg-red-50 border-l-4 border-red-400 p-4 mb-6 rounded-lg">
      <p class="text-sm text-red-700">{{ error }}</p>
    </div>
  </ng-container>
  <ng-container *ngIf="!(loading$ | async) && !(error$ | async)">
    <div *ngIf="clients$ | async as clients">
      <div *ngIf="clients.length === 0" class="text-center py-16 text-indigo-400">
        <svg class="w-12 h-12 mx-auto mb-3 opacity-40" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        <p class="font-medium">No clients found</p>
        <p class="text-sm mt-1">{{ searchKeyword ? 'Try a different search term.' : 'Register the first client.' }}</p>
      </div>
      <div class="premium-table-container">
        <app-table
          *ngIf="clients.length > 0"
          [columns]="tableColumns"
          [data]="getMappedClients(clients)"
          [actions]="tableActions"
          (actionClick)="handleAction($event)">
        </app-table>
      </div>
    </div>
  </ng-container>
</div>
