<div class="animate-fade-in">
  <!-- Header -->
  <div class="mb-10 flex flex-col md:flex-row md:justify-between md:items-end gap-6">
    <div>
      <h1 class="text-3xl font-black text-slate-900 tracking-tight">Gestion des Clients</h1>
      <p class="text-slate-500 mt-2 font-medium">Gérez les comptes clients et leurs soldes de carburant.</p>
    </div>
    <button routerLink="/employe/clients/create"
      class="inline-flex items-center gap-2 px-5 py-2.5 bg-indigo-600 text-white rounded-xl text-sm font-bold shadow-md hover:bg-indigo-700 transition-all active:scale-95 self-start md:self-auto">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
      </svg>
      Nouveau Client
    </button>
  </div>

  <!-- Search -->
  <div class="mb-8">
    <div class="relative max-w-md">
      <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
        <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0"/>
        </svg>
      </div>
      <input
        type="text"
        [(ngModel)]="searchKeyword"
        (ngModelChange)="onSearchInput($event)"
        placeholder="Rechercher par nom ou badge RFID..."
        class="w-full bg-white border border-slate-200 rounded-xl pl-11 pr-10 py-2.5 text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent shadow-sm transition-all">
      <button
        *ngIf="searchKeyword"
        (click)="clearSearch()"
        class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-slate-600 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <p *ngIf="searchKeyword && searchKeyword.length < 2" class="text-xs text-slate-400 mt-1 ml-1">
      Tapez au moins 2 caractères pour rechercher...
    </p>
  </div>

  <!-- Loading -->
  <ng-container *ngIf="loading$ | async">
    <div class="flex flex-col items-center justify-center py-20">
      <app-loading-spinner></app-loading-spinner>
      <p class="text-slate-400 mt-4 font-medium animate-pulse">Chargement des clients...</p>
    </div>
  </ng-container>

  <!-- Error -->
  <ng-container *ngIf="error$ | async as error">
    <div class="max-w-2xl mx-auto bg-rose-50 border-2 border-rose-100 p-6 rounded-2xl flex items-center gap-4">
      <div class="w-12 h-12 rounded-xl bg-rose-500 flex items-center justify-center text-white shrink-0">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
        </svg>
      </div>
      <div>
        <h3 class="font-bold text-rose-900">Erreur de chargement</h3>
        <p class="text-rose-600 text-sm mt-1">{{ error }}</p>
      </div>
    </div>
  </ng-container>

  <!-- Table -->
  <ng-container *ngIf="!(loading$ | async) && !(error$ | async)">
    <div *ngIf="clients$ | async as clients">
      <!-- Empty state -->
      <div *ngIf="clients.length === 0" class="py-20 text-center">
        <div class="max-w-sm mx-auto bg-slate-50 rounded-3xl p-10 border-2 border-dashed border-slate-200">
          <div class="w-20 h-20 bg-white rounded-full flex items-center justify-center mx-auto mb-6 shadow-sm">
            <svg class="w-10 h-10 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
          </div>
          <h3 class="font-black text-slate-900 uppercase tracking-widest text-sm">Aucun Client</h3>
          <p class="text-slate-500 text-xs mt-2 font-medium">
            {{ searchKeyword ? 'Aucun résultat pour cette recherche.' : 'Enregistrez le premier client.' }}
          </p>
        </div>
      </div>

      <div class="premium-table-container" *ngIf="clients.length > 0">
        <app-table
          [columns]="tableColumns"
          [data]="getMappedClients(clients)"
          [actions]="tableActions"
          (actionClick)="handleAction($event)">
        </app-table>
      </div>
    </div>
  </ng-container>
</div>
