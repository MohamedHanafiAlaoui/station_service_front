<div class="animate-fade-in">
  <div class="max-w-2xl mx-auto">

    <!-- Header -->
    <div class="mb-8 flex items-center justify-between">
      <div>
        <h1 class="text-3xl font-black text-slate-900 tracking-tight">Modifier Client</h1>
        <p class="text-slate-500 mt-1 font-medium">Mettez à jour les informations et le badge du client.</p>
      </div>
      <a routerLink="/employe/clients" class="flex items-center gap-1 text-sm font-semibold text-indigo-600 hover:text-indigo-800 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
        </svg>
        Retour
      </a>
    </div>

    <div class="bg-white rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100 overflow-hidden">
      <!-- Card Header -->
      <div class="px-8 py-5 border-b border-slate-50 bg-slate-50/50 flex items-center gap-4">
        <div class="w-10 h-10 rounded-xl bg-indigo-500 flex items-center justify-center shadow-sm">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
          </svg>
        </div>
        <div>
          <p class="font-bold text-slate-800 text-sm">Modifier les informations</p>
          <p class="text-xs text-slate-400">Les modifications seront sauvegardées sur le serveur.</p>
        </div>
      </div>

      <!-- Form -->
      <div class="p-8">
        <form [formGroup]="clientForm" (ngSubmit)="onSubmit()" class="space-y-5">

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
            <div class="space-y-1">
              <label class="block text-xs font-bold uppercase tracking-wider text-slate-500">Prénom *</label>
              <input formControlName="prenom" placeholder="Ex: Mohamed"
                class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm text-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all">
            </div>
            <div class="space-y-1">
              <label class="block text-xs font-bold uppercase tracking-wider text-slate-500">Nom *</label>
              <input formControlName="nom" placeholder="Ex: Alaoui"
                class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm text-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all">
            </div>
          </div>

          <div class="space-y-1">
            <label class="block text-xs font-bold uppercase tracking-wider text-slate-500">Nom d'utilisateur *</label>
            <input formControlName="username" placeholder="Ex: mohamed.alaoui"
              class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm text-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all">
          </div>


          <div *ngIf="clientForm.invalid && clientForm.touched"
               class="flex items-center gap-2 text-rose-600 text-xs bg-rose-50 rounded-xl px-4 py-3 border border-rose-100">
            <svg class="w-4 h-4 shrink-0" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
            </svg>
            <span>Veuillez remplir tous les champs obligatoires.</span>
          </div>

          <div class="pt-4 flex items-center justify-end gap-3">
            <button type="button" routerLink="/employe/clients"
              class="px-5 py-2.5 border border-slate-200 rounded-xl text-sm font-semibold text-slate-600 hover:bg-slate-50 transition-colors">
              Annuler
            </button>
            <button type="submit" [disabled]="clientForm.invalid || (loading$ | async)"
              class="px-7 py-2.5 bg-indigo-600 text-white rounded-xl text-sm font-bold shadow-md hover:bg-indigo-700 transition-all disabled:opacity-50 flex items-center gap-2">
              <svg *ngIf="loading$ | async" class="animate-spin h-4 w-4 text-white" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"/>
              </svg>
              Sauvegarder
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
