<div class="p-8 bg-indigo-50/30 min-h-screen">
  <div class="max-w-lg mx-auto">

    <!-- Header -->
    <div class="mb-8 flex items-center justify-between">
      <div>
        <h1 class="text-2xl font-bold text-indigo-950">Edit Client</h1>
        <p class="text-sm text-indigo-500 mt-1">Update client information and badge assignment.</p>
      </div>
      <a routerLink="/employe/clients" class="text-indigo-600 hover:text-indigo-800 font-medium text-sm flex items-center">
        <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
        </svg>
        Back
      </a>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-sm border border-indigo-100">

      <!-- Card Header -->
      <div class="px-8 py-5 border-b border-indigo-50">
        <div class="flex items-center space-x-3">
          <div class="w-10 h-10 rounded-xl bg-indigo-500 flex items-center justify-center">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
            </svg>
          </div>
          <div>
            <p class="font-semibold text-indigo-950 text-sm">Edit Client Details</p>
            <p class="text-xs text-indigo-400">Changes will be saved to the server.</p>
          </div>
        </div>
      </div>

      <!-- Form -->
      <div class="p-8">
        <form [formGroup]="clientForm" (ngSubmit)="onSubmit()" class="space-y-5">

          <div class="grid grid-cols-2 gap-5">
            <app-input-field
              label="First Name (Prénom) *"
              formControlName="prenom"
              placeholder="Ex: Mohamed">
            </app-input-field>
            <app-input-field
              label="Last Name (Nom) *"
              formControlName="nom"
              placeholder="Ex: Alaoui">
            </app-input-field>
          </div>

          <app-input-field
            label="Username *"
            formControlName="username"
            placeholder="Ex: mohamed.alaoui">
          </app-input-field>

          <div class="pt-1 border-t border-indigo-50">
            <div class="flex items-center space-x-2 mb-3 mt-3">
              <svg class="w-4 h-4 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 008 11a4 4 0 118 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0015.171 17m3.839 1.132c.645-2.266.99-4.659.99-7.132A8 8 0 008 4.07M3 15.364c.64-1.319 1-2.8 1-4.364 0-1.457.39-2.823 1.07-4"/>
              </svg>
              <span class="text-xs font-semibold text-indigo-500 uppercase tracking-wider">Badge RFID</span>
            </div>
            <app-input-field
              label="RFID Code *"
              formControlName="badgeRFID"
              placeholder="Scan or enter badge code">
            </app-input-field>
          </div>

          <!-- Validation state hint -->
          <div *ngIf="clientForm.invalid && clientForm.touched" class="flex items-center space-x-2 text-red-500 text-xs bg-red-50 rounded-lg px-4 py-3">
            <svg class="w-4 h-4 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
            </svg>
            <span>Please fill in all required fields correctly.</span>
          </div>

          <div class="pt-4 flex items-center justify-end space-x-3">
            <button type="button" routerLink="/employe/clients"
              class="px-5 py-2.5 border border-indigo-100 rounded-xl text-sm font-medium text-indigo-600 hover:bg-indigo-50 transition-colors">
              Cancel
            </button>
            <button type="submit" [disabled]="clientForm.invalid || (loading$ | async)"
              class="px-7 py-2.5 bg-indigo-600 text-white rounded-xl text-sm font-bold shadow-md hover:bg-indigo-700 transition-colors disabled:opacity-50 flex items-center">
              <svg *ngIf="loading$ | async" class="animate-spin h-4 w-4 mr-2 text-white" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"/>
              </svg>
              Save Changes
            </button>
          </div>

        </form>
      </div>
    </div>
  </div>
</div>
