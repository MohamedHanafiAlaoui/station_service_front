<div class="animate-fade-in">
  <div class="mb-10 flex flex-col sm:flex-row sm:justify-between sm:items-start gap-6">
    <div>
      <h1 class="text-3xl font-black text-slate-900 tracking-tight">Historique des Ventes</h1>
      <p class="text-slate-500 mt-2 font-medium">Consultez et filtrez toutes les ventes de carburant de votre station.</p>
    </div>
    <div class="flex flex-wrap items-center gap-4">
      <form [formGroup]="filterForm" (ngSubmit)="onFilter()" class="flex items-center gap-3">
        <div class="flex items-center bg-white border border-slate-200 rounded-2xl shadow-sm h-12 px-4 focus-within:ring-2 focus-within:ring-indigo-500/20 transition-all">
          <span class="text-slate-400 text-[10px] font-black uppercase tracking-widest mr-3">Du:</span>
          <input type="date" formControlName="startDate" class="bg-transparent border-none text-sm font-bold focus:ring-0 text-slate-900 outline-none w-32">
          <span class="text-slate-200 mx-3">|</span>
          <span class="text-slate-400 text-[10px] font-black uppercase tracking-widest mr-3">Au:</span>
          <input type="date" formControlName="endDate" class="bg-transparent border-none text-sm font-bold focus:ring-0 text-slate-900 outline-none w-32">
        </div>
        <button type="submit" [disabled]="loading$ | async" 
                class="px-6 py-3 bg-slate-900 text-white rounded-2xl text-xs font-black uppercase tracking-widest hover:bg-slate-800 transition-all shadow-lg active:scale-95 disabled:opacity-50 h-12">
          Filtrer
        </button>
      </form>
      <div class="hidden sm:block h-8 w-px bg-slate-200 mx-2"></div>

    </div>
  </div>
  <ng-container *ngIf="loading$ | async">
    <app-loading-spinner></app-loading-spinner>
  </ng-container>
  <ng-container *ngIf="error$ | async as error">
    <div class="bg-red-50 border-l-4 border-red-400 p-4 mb-8">
      <div class="flex">
        <div class="ml-3">
          <p class="text-sm text-red-700">
            Error loading sales: {{ error }}
          </p>
        </div>
      </div>
    </div>
  </ng-container>
  <ng-container *ngIf="!(loading$ | async) && !(error$ | async)">
    <div *ngIf="ventes$ | async as ventes">
      <div class="premium-table-container">
        <app-table 
          [columns]="tableColumns" 
          [data]="getMappedData(ventes)">
        </app-table>
      </div>
      <div *ngIf="pagination$ | async as pg" class="mt-4 flex justify-between items-center text-sm text-indigo-500 px-2" [class.hidden]="ventes.length === 0">
        <span>Showing results</span>
        <span>Total records: {{ pg.totalElements }}</span>
      </div>
    </div>
  </ng-container>
</div>
