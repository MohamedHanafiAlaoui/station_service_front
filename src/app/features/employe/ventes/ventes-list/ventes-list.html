<div class="p-8 bg-indigo-50/20 min-h-screen animate-fade-in">
  <div class="mb-8 flex flex-col sm:flex-row sm:justify-between sm:items-start gap-4">
    <div>
      <h1 class="text-2xl font-semibold text-indigo-950">Sales History</h1>
      <p class="text-sm text-indigo-500 mt-1">View and filter all fuel sales recorded at your station.</p>
    </div>
    <div class="flex flex-wrap items-center gap-4">
      <form [formGroup]="filterForm" (ngSubmit)="onFilter()" class="flex items-center gap-3">
        <div class="flex items-center bg-white border border-indigo-100 rounded-md shadow-sm h-10 px-3">
          <span class="text-indigo-500 text-sm whitespace-nowrap mr-2">From:</span>
          <input type="date" formControlName="startDate" class="bg-transparent border-none text-sm focus:ring-0 text-indigo-950 outline-none w-32">
          <span class="text-indigo-100 mx-2">|</span>
          <span class="text-indigo-500 text-sm whitespace-nowrap mr-2">To:</span>
          <input type="date" formControlName="endDate" class="bg-transparent border-none text-sm focus:ring-0 text-indigo-950 outline-none w-32">
        </div>
        <button type="submit" [disabled]="loading$ | async" class="px-4 py-2 bg-indigo-600 border border-transparent rounded-md shadow-sm text-sm font-medium text-white hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors disabled:opacity-50 h-10">
          Filter
        </button>
      </form>
      <div class="hidden sm:block h-6 w-px bg-indigo-100 mx-2"></div>
      <button routerLink="/employe/ventes/badge-sell" class="px-4 py-2 bg-white border border-indigo-200 rounded-md shadow-sm text-sm font-bold text-indigo-600 hover:bg-indigo-50 transition-colors flex items-center h-10">
        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg>
        Recod Badge Sale
      </button>
    </div>
  </div>
  <ng-container *ngIf="loading$ | async">
    <app-loading-spinner></app-loading-spinner>
  </ng-container>
  <ng-container *ngIf="error$ | async as error">
    <div class="bg-red-50 border-l-4 border-red-400 p-4 mb-8">
      <div class="flex">
        <div class="ml-3">
          <p class="text-sm text-red-700">
            Error loading sales: {{ error }}
          </p>
        </div>
      </div>
    </div>
  </ng-container>
  <ng-container *ngIf="!(loading$ | async) && !(error$ | async)">
    <div *ngIf="ventes$ | async as ventes">
      <div class="premium-table-container">
        <app-table 
          [columns]="tableColumns" 
          [data]="getMappedData(ventes)">
        </app-table>
      </div>
      <div *ngIf="pagination$ | async as pg" class="mt-4 flex justify-between items-center text-sm text-indigo-500 px-2" [class.hidden]="ventes.length === 0">
        <span>Showing results</span>
        <span>Total records: {{ pg.totalElements }}</span>
      </div>
    </div>
  </ng-container>
</div>
