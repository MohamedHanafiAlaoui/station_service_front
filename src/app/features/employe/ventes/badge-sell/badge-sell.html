<div class="animate-fade-in">
  <div class="max-w-2xl mx-auto">
    <div class="mb-10 flex flex-col sm:flex-row sm:justify-between sm:items-end gap-6">
      <div>
        <h1 class="text-3xl font-black text-slate-900 tracking-tight">Vente par Badge</h1>
        <p class="text-slate-500 mt-2 font-medium">Scannez le badge client pour traiter la transaction.</p>
      </div>
      <a routerLink="/employe/ventes" class="text-indigo-600 hover:text-indigo-800 font-black text-[10px] uppercase tracking-[0.2em] flex items-center bg-indigo-50 px-4 py-2 rounded-xl transition-all active:scale-95">
        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        Retour aux Ventes
      </a>
    </div>

    <div class="bg-white rounded-[2rem] shadow-2xl shadow-indigo-950/5 border border-slate-100 overflow-hidden">
      <!-- Alerts -->
      <div *ngIf="success" class="p-6 bg-emerald-50 border-b border-emerald-100 flex items-center text-emerald-700 font-bold text-sm animate-fade-in">
        <div class="w-8 h-8 rounded-full bg-emerald-500 flex items-center justify-center text-white mr-4 shrink-0">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
        </div>
        Transaction réussie ! Carburant autorisé.
      </div>
      <div *ngIf="error" class="p-6 bg-rose-50 border-b border-rose-100 flex items-center text-rose-700 font-bold text-sm animate-fade-in">
        <div class="w-8 h-8 rounded-full bg-rose-500 flex items-center justify-center text-white mr-4 shrink-0">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
        </div>
        {{ error }}
      </div>

      <div class="p-10">
        <form [formGroup]="sellForm" (ngSubmit)="onSubmit()" class="space-y-8">
          <!-- Scanner Visualizer -->
          <div class="relative group cursor-pointer">
              <div class="absolute -inset-1 bg-indigo-500 rounded-3xl blur opacity-20 group-hover:opacity-40 transition duration-1000 group-hover:duration-200"></div>
              <div class="relative flex flex-col items-center justify-center p-10 bg-slate-50 border-2 border-dashed border-slate-200 rounded-3xl transition-all duration-300 group-hover:bg-white group-hover:border-indigo-300">
                <div class="w-24 h-24 bg-white rounded-full flex items-center justify-center shadow-xl shadow-indigo-500/10 mb-6 group-hover:scale-110 transition-transform duration-500">
                  <div class="absolute w-full h-full rounded-full border-4 border-indigo-500 border-t-transparent animate-spin opacity-20"></div>
                  <svg class="w-10 h-10 text-indigo-600 group-hover:animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 008 11a4 4 0 118 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0015.171 17m3.839 1.132c.645-2.266.99-4.659.99-7.132A8 8 0 008 4.07M3 15.364c.64-1.319 1-2.8 1-4.364 0-1.457.39-2.823 1.07-4"></path></svg>
                </div>
                <h3 class="text-slate-900 font-black uppercase tracking-widest text-xs">Prêt à scanner...</h3>
                <p class="text-[10px] text-slate-400 mt-2 font-medium uppercase tracking-wider">Approchez le badge du lecteur</p>
              </div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
              <div class="space-y-3">
                <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Sélectionner la Pompe</label>
                <div class="relative">
                    <select formControlName="pompeId" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 text-sm font-bold text-slate-900 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:bg-white transition-all appearance-none cursor-pointer">
                        <option *ngFor="let pompe of pompes$ | async" [value]="pompe.id">
                          P{{ pompe.codePompe }} — {{ pompe.typeCarburant }}
                        </option>
                      </select>
                      <div class="absolute right-5 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                      </div>
                </div>
              </div>
              
              <div class="space-y-3">
                  <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Code RFID du Badge</label>
                  <div class="relative">
                      <input type="text" formControlName="badgeCode" placeholder="Code scanné automatiquement" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 text-sm font-bold text-slate-900 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:bg-white transition-all">
                      <div class="absolute right-5 top-1/2 -translate-y-1/2 text-indigo-500">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path></svg>
                      </div>
                  </div>
              </div>
          </div>

          <div class="space-y-3">
              <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Quantité à Servir (Litres)</label>
              <div class="relative">
                  <input type="number" formControlName="quantity" placeholder="0.00" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 text-lg font-black text-slate-900 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:bg-white transition-all">
                  <span class="absolute right-5 top-1/2 -translate-y-1/2 text-sm font-black text-slate-300 uppercase tracking-widest">Litres</span>
              </div>
          </div>

          <div class="pt-6">
            <button type="submit" [disabled]="sellForm.invalid || loading" 
                    class="w-full py-5 bg-indigo-600 text-white rounded-3xl font-black uppercase tracking-[0.2em] text-xs shadow-xl shadow-indigo-200 hover:bg-indigo-700 hover:-translate-y-1 active:scale-95 transition-all disabled:opacity-50 flex items-center justify-center gap-3">
              <span *ngIf="loading" class="animate-spin h-5 w-5 border-2 border-white border-t-transparent rounded-full"></span>
              {{ loading ? 'Traitement...' : 'Traiter la Transaction' }}
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
