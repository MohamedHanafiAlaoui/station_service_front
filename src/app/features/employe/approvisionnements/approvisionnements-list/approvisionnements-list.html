<div class="animate-fade-in">
  <div class="mb-10 flex flex-col md:flex-row md:justify-between md:items-end gap-6">
    <div>
      <h1 class="text-3xl font-black text-slate-900 tracking-tight">Stocks & Ravitaillements</h1>
      <p class="text-slate-500 mt-2 font-medium">Suivez les livraisons entrantes et l'historique des approvisionnements de votre station.</p>
    </div>
  </div>
  <ng-container *ngIf="loading$ | async">
    <app-loading-spinner></app-loading-spinner>
  </ng-container>
  <ng-container *ngIf="error$ | async as error">
    <div class="bg-red-50 border-l-4 border-red-400 p-4 mb-8">
      <div class="flex">
        <div class="ml-3">
          <p class="text-sm text-red-700">
            Error loading supplies: {{ error }}
          </p>
        </div>
      </div>
    </div>
  </ng-container>
  <ng-container *ngIf="!(loading$ | async) && !(error$ | async)">
    <div *ngIf="approvisionnements$ | async as supplies">
      <div class="premium-table-container">
        <app-table 
          [columns]="tableColumns" 
          [data]="getMappedData(supplies)">
        </app-table>
      </div>
    </div>
  </ng-container>
</div>
