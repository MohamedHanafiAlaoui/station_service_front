<div class="animate-fade-in">
  <div class="max-w-4xl mx-auto">
    <div class="mb-8 flex items-center justify-between">
      <div>
        <h1 class="text-2xl font-bold text-indigo-950">Pump Details</h1>
        <p class="text-indigo-500 mt-1">Detailed status and specifications for pump unit.</p>
      </div>
      <a routerLink="/employe/pompes" class="text-indigo-600 hover:text-indigo-800 font-medium text-sm flex items-center">
        <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        Back to List
      </a>
    </div>
    <ng-container *ngIf="loading$ | async">
      <app-loading-spinner></app-loading-spinner>
    </ng-container>
    <div *ngIf="!(loading$ | async) && (pompe$ | async) as pompe" class="grid grid-cols-1 md:grid-cols-3 gap-8">
      <div class="md:col-span-2 space-y-8">
        <div class="bg-white rounded-xl shadow-sm border border-indigo-100 p-8">
          <div class="flex items-center space-x-6 mb-8">
            <div [ngClass]="getFuelLevelPercentage(pompe) > 20 ? 'bg-green-100 text-green-600 border-green-200' : 'bg-orange-100 text-orange-600 border-orange-200'" class="w-20 h-20 rounded-2xl flex items-center justify-center border-2">
              <span class="font-bold text-3xl">P{{ pompe.codePompe }}</span>
            </div>
            <div>
              <h2 class="text-xl font-bold text-indigo-950">{{ pompe.typeCarburant }} DISPENSER</h2>
              <div class="flex items-center mt-2">
                <span [ngClass]="getFuelLevelPercentage(pompe) > 20 ? 'bg-green-500' : 'bg-orange-500'" class="w-3 h-3 rounded-full mr-2"></span>
                <span [ngClass]="getFuelLevelPercentage(pompe) > 20 ? 'text-green-600' : 'text-orange-600'" class="font-semibold">
                  {{ getFuelLevelPercentage(pompe) > 20 ? 'OPERATIONAL' : 'LOW FUEL ALERT' }}
                </span>
              </div>
            </div>
          </div>
          <div class="space-y-4">
            <div class="flex justify-between text-sm">
              <span class="text-indigo-500 font-medium text-indigo-950">Current Reservoir Level</span>
              <span class="text-indigo-500 font-bold text-indigo-950">{{ (pompe.id || 1) * 1500 }} L / 5,000 L</span>
            </div>
            <div class="w-full bg-indigo-50 rounded-full h-4 overflow-hidden border border-indigo-100">
              <div [ngClass]="getFuelLevelPercentage(pompe) > 20 ? 'bg-indigo-600' : 'bg-orange-500'" class="h-full rounded-full transition-all duration-1000" [style.width.%]="getFuelLevelPercentage(pompe)"></div>
            </div>
          </div>
        </div>

      </div>
      <div class="space-y-6">
        <div class="bg-indigo-900 rounded-xl shadow-lg p-6 text-white">
          <h3 class="font-bold mb-4">Operations</h3>
          <div class="space-y-3">
            <button [routerLink]="['/employe/pompes', pompe.id, 'add-fuel']" class="w-full py-3 bg-white text-indigo-900 rounded-lg font-bold hover:bg-indigo-50 transition-colors flex items-center justify-center">
              <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
              Add Fuel
            </button>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
