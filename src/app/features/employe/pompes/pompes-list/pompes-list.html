<div class="p-8 bg-indigo-50/30 min-h-screen">
  <div class="mb-8 flex justify-between items-center">
    <div>
      <h1 class="text-2xl font-semibold text-indigo-950">Pumps Management</h1>
      <p class="text-sm text-indigo-500 mt-1">Manage and monitor all pumps for your station.</p>
    </div>
  </div>

  <ng-container *ngIf="loading$ | async">
    <app-loading-spinner></app-loading-spinner>
  </ng-container>

  <ng-container *ngIf="error$ | async as error">
    <div class="bg-red-50 border-l-4 border-red-400 p-4 mb-8">
      <div class="flex">
        <div class="ml-3">
          <p class="text-sm text-red-700">
            Error loading pumps: {{ error }}
          </p>
        </div>
      </div>
    </div>
  </ng-container>

  <ng-container *ngIf="!(loading$ | async) && !(error$ | async)">
    <div *ngIf="pompes$ | async as pompes">
      <app-table 
        [columns]="tableColumns" 
        [data]="getMappedPompes(pompes)" 
        [actions]="tableActions"
        (actionClick)="handleAction($event)">
      </app-table>
    </div>
  </ng-container>
</div>
