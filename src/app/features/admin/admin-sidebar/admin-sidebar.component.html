<div class="flex flex-col h-full w-full">
  <div class="h-16 flex items-center px-6 border-b border-[#312e81] shrink-0">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded bg-fuchsia-600 flex items-center justify-center text-white font-bold shadow-sm text-xs">
        AD
      </div>
      <div class="flex flex-col">
        <span class="text-white text-base font-semibold tracking-wide">Admin Panel</span>
      </div>
    </div>
  </div>
  <div class="flex-1 overflow-y-auto py-6 px-3 space-y-1 custom-scrollbar">
    <div class="px-3 mb-2 text-xs font-semibold text-indigo-300/60 uppercase tracking-wider">Main</div>
    <a routerLink="/admin" routerLinkActive="bg-[#312e81] text-white" [routerLinkActiveOptions]="{exact: true}" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-indigo-200 hover:bg-[#2c286e] hover:text-white transition-all duration-200 group">
      <svg class="w-5 h-5 opacity-70 group-hover:opacity-100 transition-opacity" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
      <span class="text-sm font-medium">Dashboard</span>
    </a>
    <div class="px-3 mt-8 mb-2 text-xs font-semibold text-indigo-300/60 uppercase tracking-wider">Entities Management</div>
    <a routerLink="/admin/stations" routerLinkActive="bg-[#312e81] text-white" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-indigo-200 hover:bg-[#2c286e] hover:text-white transition-all duration-200 group">
      <svg class="w-5 h-5 opacity-70 group-hover:opacity-100 transition-opacity" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1v1H9V7zm5 0h1v1h-1V7zm-5 4h1v1H9v-1zm5 0h1v1h-1v-1zm-3 4H2v2h1v-2h8v2h1v-2z"></path></svg>
      <span class="text-sm font-medium">Stations</span>
    </a>
    <a routerLink="/admin/pompes" routerLinkActive="bg-[#312e81] text-white" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-indigo-200 hover:bg-[#2c286e] hover:text-white transition-all duration-200 group">
      <svg class="w-5 h-5 opacity-70 group-hover:opacity-100 transition-opacity" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v8l9-11h-7z"></path></svg>
      <span class="text-sm font-medium">Pompes</span>
    </a>
    <a routerLink="/admin/clients" routerLinkActive="bg-[#312e81] text-white" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-indigo-200 hover:bg-[#2c286e] hover:text-white transition-all duration-200 group">
      <svg class="w-5 h-5 opacity-70 group-hover:opacity-100 transition-opacity" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
      <span class="text-sm font-medium">Clients</span>
    </a>
    <div class="px-3 mt-8 mb-2 text-xs font-semibold text-indigo-300/60 uppercase tracking-wider">Users & Operations</div>
    <a routerLink="/admin/employes" routerLinkActive="bg-[#312e81] text-white" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-indigo-200 hover:bg-[#2c286e] hover:text-white transition-all duration-200 group">
      <svg class="w-5 h-5 opacity-70 group-hover:opacity-100 transition-opacity" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
      <span class="text-sm font-medium">Employés</span>
    </a>
    <a routerLink="/admin/ventes" routerLinkActive="bg-[#312e81] text-white" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-indigo-200 hover:bg-[#2c286e] hover:text-white transition-all duration-200 group">
      <svg class="w-5 h-5 opacity-70 group-hover:opacity-100 transition-opacity" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
      <span class="text-sm font-medium">Ventes</span>
    </a>
    <a routerLink="/admin/approvisionnements" routerLinkActive="bg-[#312e81] text-white" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-indigo-200 hover:bg-[#2c286e] hover:text-white transition-all duration-200 group">
      <svg class="w-5 h-5 opacity-70 group-hover:opacity-100 transition-opacity" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
      <span class="text-sm font-medium">Stocks</span>
    </a>
    <a routerLink="/admin/journals" routerLinkActive="bg-[#312e81] text-white" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-indigo-200 hover:bg-[#2c286e] hover:text-white transition-all duration-200 group">
      <svg class="w-5 h-5 opacity-70 group-hover:opacity-100 transition-opacity" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01m-.01 4h.01"></path></svg>
      <span class="text-sm font-medium">Journaux Audit</span>
    </a>
  </div>
  <div class="p-4 border-t border-[#312e81] shrink-0">
    <button (click)="logout()" class="flex items-center gap-3 w-full px-4 py-2.5 rounded-lg text-indigo-400 hover:bg-[#2c286e] hover:text-rose-400 transition-colors group">
      <svg class="w-5 h-5 text-indigo-400 group-hover:text-rose-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
      <span class="text-sm font-medium">Log out</span>
    </button>
  </div>
</div>
