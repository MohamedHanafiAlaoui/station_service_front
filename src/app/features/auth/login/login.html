<div class="min-h-screen w-full flex items-center justify-center bg-[#1e1b4b] px-4">
  <div class="w-full max-w-sm bg-indigo-900 shadow-xl rounded-xl p-8 border border-gray-700">
    <h2 class="text-2xl font-bold text-center text-white mb-6">
      Station Service – Login
    </h2>
    <div class="space-y-4">
      <div>
        <label class="block text-sm text-gray-300 mb-1">Username</label>
        <input [(ngModel)]="username"
               class="w-full px-4 py-2 bg-gray-700 text-white border border-gray-600 rounded-lg 
                      focus:ring-2 focus:ring-blue-500 focus:outline-none">
      </div>
      <div>
        <label class="block text-sm text-gray-300 mb-1">Password</label>
        <input [(ngModel)]="password" type="password"
               class="w-full px-4 py-2 bg-gray-700 text-white border border-gray-600 rounded-lg 
                      focus:ring-2 focus:ring-blue-500 focus:outline-none">
      </div>
      <button (click)="login()"
              class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold 
                     hover:bg-blue-700 transition">
        Login
      </button>
      @if (error) {
        <p class="text-red-400 text-sm mt-2 text-center">{{ error }}</p>
      }
      <p class="text-center text-gray-300 mt-6">
        Vous n'avez pas de compte ?
        <a routerLink="/auth/register" class="text-blue-400 font-semibold hover:underline">
          Créer un compte
        </a>
      </p>
    </div>
  </div>
</div>
