<div class="flex items-center justify-center h-full">
  <div class="w-full max-w-sm bg-white p-6 rounded-xl shadow">
    <h2 class="text-xl font-semibold mb-4 text-center">Station Service – Login</h2>

    <div class="space-y-4">
      <div>
        <label class="block text-sm mb-1">Username</label>
        <input [(ngModel)]="username" class="w-full border rounded px-3 py-2">
      </div>

      <div>
        <label class="block text-sm mb-1">Password</label>
        <input [(ngModel)]="password" type="password" class="w-full border rounded px-3 py-2">
      </div>

      <button (click)="login()" class="w-full bg-blue-600 text-white py-2 rounded">
        Login
      </button>
    </div>
  </div>
</div>
