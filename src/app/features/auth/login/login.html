<div class="min-h-screen w-full flex items-center justify-center bg-[#1e1b4b] px-4">
  <div class="w-full max-w-sm bg-indigo-900 shadow-xl rounded-xl p-8 border border-gray-700">
    <h2 class="text-2xl font-bold text-center text-white mb-6">
      Station Service – Login
    </h2>
    <div class="space-y-4">
      @if (!showChangePassword) {
        <div>
          <label class="block text-sm text-gray-300 mb-1">Username</label>
          <input [(ngModel)]="username"
                 class="w-full px-4 py-2 bg-gray-700 text-white border border-gray-600 rounded-lg 
                        focus:ring-2 focus:ring-blue-500 focus:outline-none">
        </div>
        <div>
          <label class="block text-sm text-gray-300 mb-1">Password</label>
          <input [(ngModel)]="password" type="password"
                 class="w-full px-4 py-2 bg-gray-700 text-white border border-gray-600 rounded-lg 
                        focus:ring-2 focus:ring-blue-500 focus:outline-none">
        </div>
        <button (click)="login()"
                class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold 
                       hover:bg-blue-700 transition">
          Login
        </button>
        <div class="flex justify-between items-center px-1">
          <button (click)="onForgotPassword()" class="text-[10px] text-gray-400 hover:text-white transition-colors">
            Mot de passe oublié ?
          </button>
          <button (click)="toggleChangePassword()" class="text-xs text-blue-400 hover:underline">
            Changer le mot de passe ?
          </button>
        </div>
      } @else {
        <h3 class="text-lg font-semibold text-white mb-4">Changer le mot de passe</h3>
        <div>
          <label class="block text-sm text-gray-300 mb-1">Username</label>
          <input [(ngModel)]="username"
                 class="w-full px-4 py-2 bg-gray-700 text-white border border-gray-600 rounded-lg focus:outline-none">
        </div>
        <div>
          <label class="block text-sm text-gray-300 mb-1">Ancien mot de passe</label>
          <input [(ngModel)]="oldPassword" type="password"
                 class="w-full px-4 py-2 bg-gray-700 text-white border border-gray-600 rounded-lg focus:outline-none">
        </div>
        <div>
          <label class="block text-sm text-gray-300 mb-1">Nouveau mot de passe</label>
          <input [(ngModel)]="newPassword" type="password"
                 class="w-full px-4 py-2 bg-gray-700 text-white border border-gray-600 rounded-lg focus:outline-none">
        </div>
        <div>
          <label class="block text-sm text-gray-300 mb-1">Confirmer le nouveau mot de passe</label>
          <input [(ngModel)]="confirmPassword" type="password"
                 class="w-full px-4 py-2 bg-gray-700 text-white border border-gray-600 rounded-lg focus:outline-none">
        </div>
        <button (click)="changePassword()"
                class="w-full bg-emerald-600 text-white py-2 rounded-lg font-semibold 
                       hover:bg-emerald-700 transition">
          Confirmer le changement
        </button>
        <div class="text-center">
          <button (click)="toggleChangePassword()" class="text-xs text-gray-400 hover:underline">
            Retour au login
          </button>
        </div>
      }

      @if (error) {
        <p class="text-red-400 text-sm mt-2 text-center">{{ error }}</p>
      }
      @if (success) {
        <p class="text-emerald-400 text-sm mt-2 text-center">{{ success }}</p>
      }

      @if (!showChangePassword) {
        <p class="text-center text-gray-300 mt-6">
          Vous n'avez pas de compte ?
          <a routerLink="/auth/register" class="text-blue-400 font-semibold hover:underline">
            Créer un compte
          </a>
        </p>
      }
    </div>
  </div>
</div>
