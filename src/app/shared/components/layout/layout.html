<div class="flex flex-col h-screen bg-[#f3f4f6] font-sans antialiased text-slate-800 overflow-hidden">

  <!-- Mobile Header -->
  <div class="md:hidden flex items-center justify-between h-16 bg-[#1e1b4b] px-4 shrink-0 shadow z-40">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded bg-fuchsia-600 flex items-center justify-center text-white font-bold text-xs shadow-sm">
        ST
      </div>
      <span class="text-white text-base font-semibold tracking-wide uppercase">Station Hub</span>
    </div>
    <button (click)="toggleSidebar()" class="text-white hover:text-indigo-300 focus:outline-none focus:ring-2 focus:ring-indigo-500 rounded-md p-1">
      <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path *ngIf="!isSidebarOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
        <path *ngIf="isSidebarOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
      </svg>
    </button>
  </div>

  <!-- Main body -->
  <div class="flex flex-1 overflow-hidden relative">

    <!-- Backdrop overlay on mobile when sidebar is open -->
    <div *ngIf="isSidebarOpen"
         (click)="closeSidebar()"
         class="fixed inset-0 bg-gray-900 bg-opacity-50 z-20 transition-opacity md:hidden">
    </div>

    <!-- Sidebar -->
    <aside [ngClass]="{'translate-x-0': isSidebarOpen, '-translate-x-full': !isSidebarOpen}"
           class="w-64 bg-[#1e1b4b] shadow-xl z-30 flex-shrink-0 transition-transform duration-300 ease-in-out fixed inset-y-0 left-0 md:static md:translate-x-0">
      <app-sidebar></app-sidebar>
    </aside>

    <!-- Page content -->
    <main class="flex-1 flex flex-col overflow-hidden w-full relative">
      <div class="flex-1 overflow-y-auto p-4 md:p-6 lg:p-8 relative custom-scrollbar">
        <div class="max-w-7xl mx-auto">
          <router-outlet></router-outlet>
        </div>
      </div>
    </main>

  </div>
</div>
